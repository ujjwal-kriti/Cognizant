<!DOCTYPE html>
<html>
<head>
    <title>Conditionals and Loops</title>
</head>
<body>

<script>

const events = [
    {name:"Music Fest", seats:10},
    {name:"Workshop", seats:0},
    {name:"Sports Day", seats:20}
];

events.forEach(event => {

    if(event.seats > 0){
        console.log(event.name);
    }
    else{
        console.log(event.name + " Full");
    }

});

try{

    let seats = 0;

    if(seats <= 0){
        throw "No Seats Available";
    }

}
catch(error){
    console.log(error);
}

</script>

</body>
</html>
