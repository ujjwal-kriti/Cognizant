<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>

    <style>
        .event-img{
            border: 2px solid black;
            width: 200px;
            height: 150px;
        }

        table{
            margin: auto;
        }

        td{
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Community Event Gallery</h2>

    <table>
        <tr>
            <td>
                <img src="event1.jpg" alt="Tree Plantation"
                     title="Tree Plantation Event"
                     class="event-img">
                <p>Tree Plantation Drive</p>
            </td>

            <td>
                <img src="event2.jpg" alt="Blood Donation"
                     title="Blood Donation Camp"
                     class="event-img">
                <p>Blood Donation Camp</p>
            </td>

            <td>
                <img src="event3.jpg" alt="Sports Event"
                     title="Sports Competition"
                     class="event-img">
                <p>Annual Sports Meet</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="event4.jpg" alt="Cleanliness Drive"
                     title="Cleanliness Drive"
                     class="event-img">
                <p>Cleanliness Campaign</p>
            </td>

            <td>
                <img src="event5.jpg" alt="Workshop"
                     title="Technical Workshop"
                     class="event-img">
                <p>Technical Workshop</p>
            </td>

            <td>
                <img src="event6.jpg" alt="Cultural Event"
                     title="Cultural Fest"
                     class="event-img">
                <p>Cultural Festival</p>
            </td>
        </tr>
    </table>

</body>
</html>
