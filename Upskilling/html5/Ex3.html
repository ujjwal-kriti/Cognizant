<!DOCTYPE html>
<html>
<head>
    <title>Welcome Banner</title>

    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>

</head>
<body>

    <div id="welcomeBanner">
        <h2>Welcome, User!</h2>

        <p>
            Special Offer:
            <span style="color:red; font-weight:bold;">
                Get 50% Discount Today!
            </span>
        </p>

        <p class="highlight">
            Limited Time Offer
        </p>
    </div>

</body>
</html>
