<!DOCTYPE html>
<html>
<head>
    <title>Selectors Playground</title>

    <style>
        /* Universal Selector */
        *{
            margin: 0;
            padding: 0;
        }

        /* Element Selector */
        h2{
            color: blue;
            margin: 10px;
        }

        /* ID Selector */
        #mainHeader{
            background-color: navy;
            color: white;
            text-align: center;
            padding: 15px;
        }

        /* Class Selector */
        .eventCard{
            border: 2px solid black;
            margin: 10px;
            padding: 10px;
        }

        /* Grouping Selector */
        h3,p{
            color: green;
        }
    </style>

</head>
<body>

    <div id="mainHeader">
        <h1>Local Community Event Portal</h1>
    </div>

    <h2>Upcoming Events</h2>

    <div class="eventCard">
        <h3>Tree Plantation Drive</h3>
        <p>Join us in making the environment greener.</p>
    </div>

    <div class="eventCard">
        <h3>Blood Donation Camp</h3>
        <p>Donate blood and save lives.</p>
    </div>

</body>
</html>
