<!DOCTYPE html>
<html>
<head>
    <title>Link and List Styling</title>

    <style>
        a:link{
            color: blue;
        }

        a:visited{
            color: purple;
        }

        a:hover{
            color: red;
        }

        a:active{
            color: green;
        }

        ul{
            list-style-type: none;
            list-style-position: inside;
        }

        li{
            margin: 10px;
            padding: 5px;
        }
    </style>
</head>
<body>

    <h2>Navigation Menu</h2>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Events</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

</body>
</html>
