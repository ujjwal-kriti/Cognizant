<!DOCTYPE html>
<html>
<head>
    <title>Color and Background Styling</title>

    <style>
        body{
            background-color: #f0f0f0; /* Fallback Color */
            background-image: url("bg.jpg");
            background-size: cover;
        }

        h1{
            color: #0066cc; /* HEX Color */
        }

        p{
            background-color: rgba(0, 128, 0, 0.3); /* RGBA Color */
            padding: 10px;
        }

        h2{
            background: linear-gradient(to right, blue, lightblue);
            color: white;
            padding: 10px;
        }
    </style>

</head>
<body>

    <h1>Local Community Event Portal</h1>

    <h2>Upcoming Events</h2>

    <p>
        Welcome to the community portal for all local events.
    </p>

</body>
</html>
