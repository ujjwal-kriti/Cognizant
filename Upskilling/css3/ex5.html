<!DOCTYPE html>
<html>
<head>
    <title>Typography Example</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body{
            font-family: 'Poppins', sans-serif;
        }

        h1{
            font-size: 36px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
        }

        h2{
            font-style: italic;
            letter-spacing: 3px;
        }

        p{
            font-size: 18px;
            line-height: 1.8;
            text-align: justify;
        }
    </style>

</head>
<body>

    <h1>Community Events</h1>

    <h2>Upcoming Activities</h2>

    <p>
        This portal provides information about local community activities,
        workshops, cultural programs and volunteer opportunities.
    </p>

</body>
</html>
