<!DOCTYPE html>
<html>
<head>
    <title>Alignment and Reordering</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="row justify-content-center align-items-center"
         style="height:200px;">

        <div class="col-4 bg-primary text-white p-3">
            Center Box
        </div>

    </div>

    <hr>

    <div class="row">

        <div class="col-md-6 order-md-2 bg-success text-white p-3">
            Column A
        </div>

        <div class="col-md-6 order-md-1 bg-warning p-3">
            Column B
        </div>

    </div>

</div>

</body>
</html>
